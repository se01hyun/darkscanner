<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Dark-Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #e8e8e8;
    }

    /* ── 헤더 ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #1e1e1e;
    }
    .header h1 { font-size: 15px; color: #ff4d4d; }
    .header .subtitle { font-size: 10px; color: #555; margin-top: 1px; }

    /* ── 위험도 바 ── */
    .risk-section { padding: 12px 14px 10px; border-bottom: 1px solid #1e1e1e; }
    .risk-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 6px; }
    .risk-label { font-size: 11px; color: #777; }
    .risk-score { font-size: 28px; font-weight: 800; color: #e8e8e8; line-height: 1; }
    .risk-max   { font-size: 13px; color: #555; }
    .risk-tag {
      margin-left: auto;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 4px;
    }
    .risk-tag--danger  { background: #e74c3c; color: #fff; }
    .risk-tag--warning { background: #e67e22; color: #fff; }
    .risk-tag--caution { background: #f39c12; color: #fff; }
    .risk-tag--safe    { background: #2ecc71; color: #fff; }
    .risk-bar-bg {
      height: 4px; background: #222; border-radius: 2px;
      overflow: hidden; margin-bottom: 8px;
    }
    .risk-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
    .risk-summary { font-size: 11px; color: #666; }
    .risk-summary span { color: #aaa; }

    /* ── 탐지 목록 ── */
    .section-title {
      padding: 10px 14px 6px;
      font-size: 11px; font-weight: 700; color: #666;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .detection-list { max-height: 320px; overflow-y: auto; }
    .detection-list::-webkit-scrollbar { width: 4px; }
    .detection-list::-webkit-scrollbar-track { background: #111; }
    .detection-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .detection-item {
      padding: 10px 14px;
      border-bottom: 1px solid #1a1a1a;
    }
    .detection-item:last-child { border-bottom: none; }

    .detection-top {
      display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
    }
    .detection-label { font-size: 13px; font-weight: 700; color: #e8e8e8; flex: 1; }

    .tag {
      font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 3px; white-space: nowrap;
    }
    .tag--confirmed { background: #3a1a1a; color: #ff6b6b; border: 1px solid #e74c3c; }
    .tag--suspected { background: #2a1e0a; color: #f5a623; border: 1px solid #f39c12; }
    .tag--high   { background: #3a1a1a; color: #ff6b6b; }
    .tag--medium { background: #2a1a0a; color: #e67e22; }
    .tag--low    { background: #1a2a1a; color: #2ecc71; }

    .detection-text   { font-size: 11px; color: #888; margin-bottom: 4px; line-height: 1.4; word-break: break-all; }
    .detection-reason { font-size: 11px; color: #555; margin-bottom: 4px; font-style: italic; }
    .detection-module { font-size: 10px; color: #444; }

    .empty-state { padding: 28px 14px; text-align: center; color: #444; font-size: 12px; }

    /* ── API 키 설정 ── */
    .api-section { padding: 10px 14px 12px; border-top: 1px solid #1e1e1e; }
    .api-section label { display: block; font-size: 11px; color: #555; margin-bottom: 5px; }
    .api-row { display: flex; gap: 6px; }
    input[type="password"] {
      flex: 1; padding: 6px 8px;
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 5px;
      color: #e8e8e8; font-size: 12px; outline: none;
    }
    input[type="password"]:focus { border-color: #ff4d4d; }
    .btn-save {
      padding: 6px 12px; background: #ff4d4d; color: #fff;
      border: none; border-radius: 5px; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .btn-save:hover { background: #e03c3c; }
    .btn-clear {
      padding: 6px 10px; background: #1a1a1a; color: #666;
      border: 1px solid #2a2a2a; border-radius: 5px; font-size: 12px;
      cursor: pointer; white-space: nowrap;
    }
    .btn-clear:hover { color: #aaa; border-color: #444; }
    #status { font-size: 11px; color: #444; margin-top: 5px; min-height: 16px; }
    #status.ok  { color: #2ecc71; }
    #status.err { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Dark-Scanner</h1>
      <div class="subtitle">온라인 쇼핑몰 다크패턴 탐지</div>
    </div>
  </div>

  <div class="risk-section">
    <div class="risk-row">
      <span class="risk-label">위험도</span>
      <span class="risk-score" id="riskScore">0</span>
      <span class="risk-max">/ 100</span>
      <span class="risk-tag risk-tag--safe" id="riskTag">안전</span>
    </div>
    <div class="risk-bar-bg">
      <div class="risk-bar-fill" id="riskBar" style="width:0%;background:#2ecc71;"></div>
    </div>
    <div class="risk-summary" id="riskSummary">탐지된 패턴 없음</div>
  </div>

  <div class="section-title" id="listTitle" style="display:none"></div>
  <div class="detection-list" id="detectionList">
    <div class="empty-state">현재 페이지에서 탐지된 항목이 없습니다.</div>
  </div>

  <div class="api-section">
    <label>Claude API 키</label>
    <div class="api-row">
      <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" />
      <button class="btn-save" id="saveBtn">저장</button>
      <button class="btn-clear" id="clearBtn">초기화</button>
    </div>
    <div id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
